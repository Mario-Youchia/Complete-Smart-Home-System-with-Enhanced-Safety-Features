name: smarthome
description: A Flutter-based smart home application for monitoring, controlling, and managing connected home devices through a local server.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.2.1
  shared_preferences: ^2.0.6
  flutter_local_notifications: ^17.1.2
  syncfusion_flutter_charts: ^21.1.3
  intl: ^0.17.0
  flutter_background_service: ^4.0.0
  flutter_background_service_android: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
  
